syntax = "proto3";

// memlake gRPC API. Internal, service-to-service (east-west): this replaces a direct
// Postgres connection in Hindsight. Every RPC is answerable by any stateless server
// replica — all coordination happens in object storage — so the deployment is N identical
// `serve` pods behind one k8s Service, plus a separate `index` Deployment.
package memlake.v1;

service Memlake {
  // Ensure a namespace (bank) exists. Idempotent: safe to call on every startup.
  rpc CreateNamespace(CreateNamespaceRequest) returns (CreateNamespaceResponse);

  // Write a batch of ops as one atomic WAL entry. Returns once the entry is durably
  // persisted to object storage under a uniquely-claimed sequence number — NOT after
  // indexing. The write is immediately visible to any STRONG-consistency Query.
  rpc Write(WriteRequest) returns (WriteResponse);

  // Answer a query across one or more memory_types in a single call. Always runs all three
  // arms (dense vector + BM25 full-text + graph expansion) over one shared snapshot, so the
  // storage reads coalesce into common roundtrip waves. Returns each candidate with its raw
  // per-arm scores; the client fuses. memory_types are independent — hits are never fused
  // across types.
  rpc Query(QueryRequest) returns (QueryResponse);

  // ---- Admin / introspection ----
  //
  // These serve operators and the admin UI, not the hot path. They are answerable by any
  // replica for the same reason every other RPC is: the answer lives in object storage.
  // They are deliberately NOT part of the retrieval contract — a client doing recall
  // should never need them.

  // Every namespace in the bucket, by listing manifest objects. Cost is one LIST, so this
  // is an operator call, not something to poll per request.
  rpc ListNamespaces(ListNamespacesRequest) returns (ListNamespacesResponse);

  // A namespace's index state: generation, WAL position, and per-memory_type doc and
  // cluster counts. Reads the manifest and each type's metadata — it does NOT fetch
  // cluster data, so its cost is independent of corpus size.
  rpc Stats(StatsRequest) returns (StatsResponse);

  // Fetch memories by id, without a query. Resolves each id through the primary-key
  // SSTable to its cluster, then range-reads only those clusters.
  rpc Get(GetRequest) returns (GetResponse);

  // Page through a memory_type's stored memories in cluster order. This is a full scan by
  // construction — the cost DOES grow with the corpus — so it exists for browsing and
  // debugging, never for retrieval. Use `Query` to find things.
  rpc Scan(ScanRequest) returns (ScanResponse);

  // Tombstone every memory matching a predicate. The predicate is metadata AND tags (all
  // must hold), e.g. `{document_id, chunk_id}` to replace a document's facts on re-ingest.
  // A full scan by construction (metadata is not indexed) — a maintenance op, not a query.
  rpc DeleteByPredicate(DeleteByPredicateRequest) returns (DeleteByPredicateResponse);

  // The write-ahead log as an operator view: which sequences are committed, and which the
  // indexer has not folded yet. Entries at or below the manifest's `wal_index_cursor` are
  // folded and may already have been reclaimed by GC, so this is a window on the live log,
  // not a history of every write ever made.
  rpc ListWal(ListWalRequest) returns (ListWalResponse);

  // How k-means partitioned one memory_type: its trained centroids, per-cluster sizes and
  // tag summaries, and optionally a sample of member memories. Centroids are already
  // resident on every query node, so returning them alone costs no object-storage read;
  // sampling members does read cluster files, and is bounded by `member_sample`.
  rpc IndexLayout(IndexLayoutRequest) returns (IndexLayoutResponse);
}

// ---- Value types -----------------------------------------------------------

// A dense embedding as raw little-endian float32, length = dim * 4 bytes. Sent as bytes
// (not `repeated float`) so it is zero-copy on both ends and ~4x smaller than JSON floats.
message Vector {
  bytes f32le = 1;
}

message Timestamps {
  optional int64 event_date = 1;
  optional int64 occurred_start = 2;
  optional int64 occurred_end = 3;
  optional int64 mentioned_at = 4;
}

enum LinkType {
  CAUSES = 0;
  CAUSED_BY = 1;
  ENABLES = 2;
  PREVENTS = 3;
}

// A causal edge is intrinsic to a memory and travels in the WAL (semantic edges, by
// contrast, are derived by the indexer and never sent by clients).
message CausalEdge {
  bytes target = 1;     // 16-byte MemoryId
  LinkType link_type = 2;
  float weight = 3;
}

message Memory {
  // 16-byte MemoryId. Leave empty and set `key` to have the server derive a stable id.
  bytes id = 1;
  // Optional external key; if `id` is empty the server derives id = uuidv5(key).
  string key = 2;
  Vector vector = 3;
  string text = 4;
  uint32 memory_type = 5;   // fits u8; values > 255 are rejected
  repeated string tags = 6;
  uint32 proof_count = 7;
  repeated bytes entity_ids = 8;    // 16-byte EntityIds (UUIDs)
  Timestamps timestamps = 9;
  repeated CausalEdge causal_out = 10;
  // Opaque client key→value metadata. memlake never indexes or interprets it — it is stored
  // verbatim and returned on read (see `MemoryPayload.metadata`). Use it for fields memlake
  // has no first-class model of: context, document_id, chunk_id, arbitrary JSON-as-string.
  map<string, string> metadata = 11;
}

// A tag list wrapper — message presence distinguishes "replace tags with this (maybe empty)
// list" from "leave tags untouched", which a bare `repeated` cannot.
message TagList {
  repeated string tags = 1;
}

// A partial update to one memory: set only the fields present, leave the rest. Avoids
// re-sending the whole memory for consolidation/curation edits. `proof_count_delta` is
// relative; the rest are absolute sets (metadata merges its keys, it does not replace).
message Patch {
  bytes id = 1;                       // 16-byte MemoryId
  int32 proof_count_delta = 2;        // relative; 0 = no change
  optional string text = 3;           // set text
  Vector vector = 4;                  // set the embedding (present => set)
  TagList tags = 5;                   // replace tags (present => set, empty list clears)
  Timestamps timestamps = 6;          // set timestamps (present => set)
  map<string, string> metadata = 7;   // upsert these metadata keys (merge, not replace)
}

// A conjunction (AND) over a memory's type, metadata, and tags. An empty predicate matches
// every memory (used for "delete everything"). Reused by TombstoneWhere and DeleteByPredicate.
message Predicate {
  repeated uint32 memory_types = 1;      // restrict to these types; empty = any
  map<string, string> metadata_equals = 2;  // all these key=value pairs must be present
  TagFilter tags = 3;                    // optional tag condition
}

message Op {
  oneof kind {
    Memory upsert = 1;
    bytes tombstone = 2;          // 16-byte MemoryId to delete
    Patch patch = 3;
    uint64 guard_expect_seq_lt = 4;   // optimistic precondition (compare-and-set)
    // Delete every memory matching the predicate whose last write is older than this entry's
    // sequence. Put it in the SAME entry as a re-ingest's upserts to atomically replace a
    // document's facts: the new upserts share this seq, so the delete spares them.
    Predicate tombstone_where = 5;
  }
}

// ---- Write -----------------------------------------------------------------

message WriteRequest {
  string namespace = 1;
  repeated Op ops = 2;          // applied atomically as one WAL entry
}

message WriteResponse {
  uint64 seq = 1;               // the claimed WAL sequence (the write's order point)
  uint32 attempts = 2;          // conditional-PUT attempts it took to claim the slot
}

// ---- Query -----------------------------------------------------------------

enum Consistency {
  STRONG = 0;     // reflect every acked write (checks WAL head, scans the tail)
  EVENTUAL = 1;   // serve from the cached manifest; staleness bounded by index interval
}

enum TagsMatch {
  ANY = 0;         // memory has at least one of the tags (untagged allowed)
  ALL = 1;         // memory has all of the tags (untagged allowed)
  ANY_STRICT = 2;  // ANY, but exclude untagged memories
  ALL_STRICT = 3;  // ALL, but exclude untagged memories
  EXACT = 4;       // memory's tag set equals the filter exactly
}

message TagFilter {
  repeated string tags = 1;
  TagsMatch mode = 2;
}

message QueryRequest {
  string namespace = 1;
  // memory_types to query. Empty means every type present in the snapshot. Each type is an
  // independent index; hits carry their memory_type and are never fused across types.
  repeated uint32 memory_types = 2;
  Vector vector = 3;           // the dense + graph arms (omit to skip both)
  string text = 4;             // the full-text arm (empty to skip)
  TagFilter tags = 5;          // omit for no tag filter
  // Per-arm candidate depth; 0 uses the server default. Which arms run is decided by the
  // inputs: `vector` drives dense + graph, `text` drives full-text. (The graph arm always
  // runs alongside the dense arm — the 3-way query is the normal path.)
  uint32 vector_top_k = 6;
  uint32 text_top_k = 7;
  uint32 graph_top_k = 8;
  uint32 nprobe = 9;           // IVF clusters probed (0 = server default)
  Consistency consistency = 10;
  // The temporal arm: when both are set, select entry points whose effective time
  // (COALESCE(occurred_start, mentioned_at, occurred_end)) falls in [temporal_from,
  // temporal_to], spread one hop through links, and score by proximity to the window centre.
  // Epoch ints; the unit only needs to match what was written. Requires `vector` (entry
  // points are similarity-ranked). Omit either to skip the arm.
  optional int64 temporal_from = 11;
  optional int64 temporal_to = 12;
}

// One arm's raw contribution to a hit. `present` says whether the arm surfaced this id;
// when true, `rank` is its 0-based position within that arm and `score` its native score
// (dense = cosine similarity, text = BM25, graph = activation).
message ArmScore {
  bool present = 1;
  uint32 rank = 2;
  float score = 3;
}

// The stored memory returned inline with a search hit. The server already has it
// materialized to score the candidate, so returning it costs no extra object-storage read —
// recall never needs a second round trip to hydrate. The embedding vector is omitted (large
// and the client already has it); request it via Get if needed.
message MemoryPayload {
  string text = 1;
  repeated string tags = 2;
  uint32 proof_count = 3;
  repeated bytes entity_ids = 4;    // 16-byte EntityIds
  Timestamps timestamps = 5;
  repeated CausalEdge causal_out = 6;
  map<string, string> metadata = 7;   // the opaque metadata, verbatim
}

// A retrieved candidate with the raw signal from each arm plus the materialized memory.
// memlake does NO fusion: the client combines the raw arm scores (RRF, weighting,
// re-ranking) itself.
message Hit {
  bytes id = 1;                // 16-byte MemoryId
  uint32 memory_type = 2;
  ArmScore dense = 3;          // vector / cosine arm
  ArmScore text = 4;           // BM25 arm
  ArmScore graph = 5;          // graph-expansion arm
  ArmScore temporal = 7;       // temporal arm (entry points + one-hop spread)
  MemoryPayload memory = 6;    // the stored memory, returned inline (no extra roundtrip)
}

message QueryResponse {
  // The union of candidates across arms and memory_types. Unordered — the client ranks by
  // its own fusion. Group by `memory_type` first (types are independent).
  repeated Hit hits = 1;
  uint32 load_roundtrips = 2;  // shared across arms + types (reads coalesce into common waves)
}

// ---- Namespace -------------------------------------------------------------

message CreateNamespaceRequest {
  string namespace = 1;
}

message CreateNamespaceResponse {}

// ---- Delete by predicate ---------------------------------------------------

message DeleteByPredicateRequest {
  string namespace = 1;
  // memory_types to scan; empty means all. (Only these types are considered for deletion.)
  repeated uint32 memory_types = 2;
  // Match memories whose metadata contains ALL these key=value pairs (AND) — e.g.
  // {"document_id": "d-42", "chunk_id": "3"}. Empty matches on tags / delete_all alone.
  map<string, string> metadata_equals = 3;
  TagFilter tags = 4;         // optional additional filter, AND-ed with metadata_equals
  // Safety: an empty predicate (no metadata, no tags) is rejected unless delete_all is set,
  // so a stray empty request cannot wipe the namespace by accident.
  bool delete_all = 5;
  // How the delete is executed:
  //   false (default) — write one TombstoneWhere WAL op: atomic, race-closed, and lazy
  //     (materialized at the next fold). `deleted` is 0 (nothing is scanned). This is the
  //     right path for document re-ingest. To replace atomically, prefer a single Write with
  //     [Op.tombstone_where, Op.upsert...] so the delete and the new facts share one seq.
  //   true — scan now and tombstone matches by id: O(corpus), returns the exact `deleted`
  //     count, and materializes immediately. An admin verb, not the ingest path.
  bool eager = 6;
}

message DeleteByPredicateResponse {
  uint64 deleted = 1;   // number of memories tombstoned
  uint64 seq = 2;       // WAL sequence of the tombstone batch (0 if nothing matched)
}

// ---- Admin / introspection -------------------------------------------------

message ListNamespacesRequest {}

message ListNamespacesResponse {
  repeated string namespaces = 1;   // sorted
}

message StatsRequest {
  string namespace = 1;
  Consistency consistency = 2;
}

// One memory_type's index state. Each type is an independent index, so every number here
// is per-type; there is no meaningful corpus-wide equivalent except their sum.
message TypeStats {
  uint32 memory_type = 1;
  // Live memories: the indexed generation's count, minus tombstones, plus un-indexed WAL
  // tail entries. This is what a query can actually return.
  uint64 doc_count = 2;
  uint32 cluster_count = 3;
  // Memory count when this type's IVF centroids were last trained. The gap between this
  // and doc_count is what drives an assign-only retrain.
  uint64 train_count = 4;
  bool has_index = 5;   // false = present only in the WAL tail, never indexed yet
}

message StatsResponse {
  string namespace = 1;
  uint64 generation = 2;
  optional uint64 prev_generation = 3;
  uint64 wal_head = 4;
  // Last WAL sequence folded into the generation. `wal_head - wal_index_cursor` is the
  // un-indexed backlog a STRONG query pays to scan.
  uint64 wal_index_cursor = 5;
  string tokenizer_config_hash = 6;
  uint32 format_version = 7;
  uint64 doc_count = 8;              // sum over types
  repeated TypeStats types = 9;
  uint64 through_seq = 10;           // the WAL sequence this snapshot reflects
  uint32 load_roundtrips = 11;
}

message GetRequest {
  string namespace = 1;
  repeated bytes ids = 2;            // 16-byte MemoryIds
  // Include the embedding. Off by default: vectors dominate the response size and a
  // caller browsing memories rarely wants them.
  bool include_vector = 3;
  Consistency consistency = 4;
}

message GetResponse {
  // Only ids that resolved, in request order. A missing or tombstoned id is simply absent
  // — Get is not an existence assertion.
  repeated StoredMemoryRecord memories = 1;
}

// A memory returned by a non-query read. Unlike `Hit` there are no arm scores: nothing
// ranked it, it was addressed directly.
message StoredMemoryRecord {
  bytes id = 1;
  uint32 memory_type = 2;
  MemoryPayload memory = 3;
  Vector vector = 4;                 // present only if include_vector was set
}

message ScanRequest {
  string namespace = 1;
  // Types to walk, in ascending order. Empty means every type in the snapshot.
  repeated uint32 memory_types = 2;
  uint32 limit = 3;                  // 0 uses the server default
  // Opaque cursor from the previous response. Empty starts at the beginning. A cursor is
  // only valid against the generation that produced it; the server restarts the scan if
  // the generation moved under it. It is a position, not a snapshot: writes landing
  // mid-walk can shift later pages, so a scan is eventually-complete browsing, not a
  // consistent iterator. Do not build anything that needs exactly-once over a live corpus
  // on it.
  string page_token = 4;
  bool include_vector = 5;
  TagFilter tags = 6;                // omit for no tag filter
  Consistency consistency = 7;
}

message ScanResponse {
  repeated StoredMemoryRecord memories = 1;
  string next_page_token = 2;        // empty when the scan is exhausted
}

// ---- WAL introspection -----------------------------------------------------

message ListWalRequest {
  string namespace = 1;
  // Start at this sequence. 0 begins at the oldest entry still retained.
  uint64 start_seq = 2;
  uint32 limit = 3;          // 0 uses the server default
  // Decode each entry's ops. Off by default: one entry is a whole group-commit batch and
  // can hold thousands of memories, so the listing stays a header view unless asked.
  bool include_ops = 4;
}

// How many of each op kind an entry holds. Cheap to compute and usually all an operator
// needs to see the shape of a batch.
message WalOpCounts {
  uint32 upserts = 1;
  uint32 tombstones = 2;
  uint32 patches = 3;
  uint32 guards = 4;
  // Predicate deletes (`DeleteByPredicate`). Counted apart from `tombstones` because one
  // op can remove any number of memories, so the two are not comparable quantities.
  uint32 predicate_tombstones = 5;
}

// One op inside an entry. An upsert reports its memory's identity and shape rather than
// the whole record — this is a log view, not a way to read memories back (use Get).
message WalOpDetail {
  oneof kind {
    WalUpsert upsert = 1;
    bytes tombstone = 2;              // 16-byte MemoryId
    Patch patch = 3;
    uint64 guard_expect_seq_lt = 4;
    // A predicate delete, rendered as a human-readable summary of what it matched
    // (e.g. `type=1 meta[document_id=d-42] tags:ANY[prod]`). The log view shows what the
    // op asked for; which memories it actually hit is not recorded in the entry.
    string tombstone_where = 5;
  }
}

message WalUpsert {
  bytes id = 1;                       // 16-byte MemoryId
  uint32 memory_type = 2;
  string text = 3;
  repeated string tags = 4;
  uint32 vector_dim = 5;              // 0 = the memory carries no embedding
}

message WalEntryInfo {
  uint64 seq = 1;                     // the entry's order point
  uint64 size_bytes = 2;              // the WAL object's size
  WalOpCounts counts = 3;
  // True once the indexer has folded this entry into a generation (seq <= wal_index_cursor).
  // Un-folded entries are exactly what a STRONG query pays to scan on every read.
  bool folded = 4;
  repeated WalOpDetail ops = 5;       // only when include_ops was set
}

message ListWalResponse {
  repeated WalEntryInfo entries = 1;
  uint64 wal_head = 2;                // last committed sequence
  uint64 wal_index_cursor = 3;        // last sequence folded into the current generation
  uint64 next_seq = 4;                // resume point; 0 when the log is exhausted
}

// ---- IVF layout ------------------------------------------------------------

message IndexLayoutRequest {
  string namespace = 1;
  uint32 memory_type = 2;
  // Sample up to this many member memories, spread across clusters, and return their
  // vectors. 0 returns centroids only — which needs no object-storage read at all, since
  // the centroids are already resident. Sampling reads cluster files, so it is bounded.
  uint32 member_sample = 3;
  Consistency consistency = 4;
}

message ClusterInfo {
  uint32 cluster_id = 1;
  Vector centroid = 2;                // raw little-endian f32, length = dim * 4
  // Members assigned to this centroid when the generation was built. Note this is the
  // trained size: it does not include un-indexed WAL-tail writes.
  uint64 size = 3;
  repeated string tags = 4;           // the cluster's tag summary (union over members)
  bool has_untagged = 5;
}

// A member memory returned for plotting, with just enough to label a point.
message ClusterMember {
  bytes id = 1;                       // 16-byte MemoryId
  uint32 cluster_id = 2;
  Vector vector = 3;
  string text = 4;
}

message IndexLayoutResponse {
  string namespace = 1;
  uint32 memory_type = 2;
  uint64 generation = 3;
  uint32 dim = 4;                     // 0 when the type has no embeddings
  repeated ClusterInfo clusters = 5;
  repeated ClusterMember members = 6; // empty unless member_sample was set
}
