syntax = "proto3";

// memlake gRPC API. Internal, service-to-service (east-west): this replaces a direct
// Postgres connection in Hindsight. Every RPC is answerable by any stateless server
// replica — all coordination happens in object storage — so the deployment is N identical
// `serve` pods behind one k8s Service, plus a separate `index` Deployment.
package memlake.v1;

service Memlake {
  // Ensure a namespace (bank) exists. Idempotent: safe to call on every startup.
  rpc CreateNamespace(CreateNamespaceRequest) returns (CreateNamespaceResponse);

  // Drop a whole namespace: delete every object under its prefix (manifest, WAL, all
  // generations). Irreversible. The manifest is deleted first, which fences a concurrent
  // indexer — an in-flight fold loses its CAS publish and cannot leave a dangling manifest
  // that points at swept files. The drop is still not transactional, though: a query racing
  // the delete may fault on a since-deleted file, so dropping under active writes is
  // discouraged. Returns the number of objects removed.
  rpc DeleteNamespace(DeleteNamespaceRequest) returns (DeleteNamespaceResponse);

  // Write a batch of ops as one atomic WAL entry. Returns once the entry is durably
  // persisted to object storage under a uniquely-claimed sequence number. The write is
  // immediately visible to any Query without waiting for the indexer: a read always merges
  // the un-indexed WAL tail over the indexed generation. Set `wait_for_index` to also fold
  // the tail into the generation before returning (a heavier, synchronous call).
  rpc Write(WriteRequest) returns (WriteResponse);

  // Answer a query across one or more memory_types in a single call. Reads reflect every
  // acked write: the snapshot checks the WAL head and scans the un-indexed tail over the
  // indexed generation. Always runs all three arms (dense vector + BM25 full-text + graph
  // expansion) over one shared snapshot, so the storage reads coalesce into common roundtrip
  // waves. Returns each candidate with its raw per-arm scores; the client fuses. memory_types
  // are independent — hits are never fused across types.
  rpc Query(QueryRequest) returns (QueryResponse);

  // ---- Admin / introspection ----
  //
  // These serve operators and the admin UI, not the hot path. They are answerable by any
  // replica for the same reason every other RPC is: the answer lives in object storage.
  // They are deliberately NOT part of the retrieval contract — a client doing recall
  // should never need them.

  // Every namespace in the bucket, by listing manifest objects. Cost is one LIST, so this
  // is an operator call, not something to poll per request.
  rpc ListNamespaces(ListNamespacesRequest) returns (ListNamespacesResponse);

  // A namespace's index state: generation, WAL position, and per-memory_type doc and
  // cluster counts. Reads the manifest and each type's metadata — it does NOT fetch
  // cluster data, so its cost is independent of corpus size.
  rpc Stats(StatsRequest) returns (StatsResponse);

  // Fetch memories by id, without a query. Resolves each id through the primary-key
  // SSTable to its cluster, then range-reads only those clusters.
  rpc Get(GetRequest) returns (GetResponse);

  // How many memories carry each entity. Reads the entity posting index — the same
  // structure the graph arm expands through — so its cost scales with the number of
  // entities, not the corpus. Counts reflect the indexed generation plus the un-indexed
  // WAL tail, the same adjustment `Stats.doc_count` makes.
  rpc EntityStats(EntityStatsRequest) returns (EntityStatsResponse);

  // Live item count per distinct value of one declared metadata key (see
  // CreateNamespace.indexed_metadata_keys) — the primitive behind "count memories grouped by
  // document_id / consolidated". Read from the per-segment tally, so it is a metadata read,
  // not a corpus scan. Counts reflect the indexed generation plus the WAL tail, the same
  // adjustment Stats.doc_count and EntityStats make. Empty for a key that was not declared.
  rpc MetadataStats(MetadataStatsRequest) returns (MetadataStatsResponse);

  // Live edge totals — derived semantic (kNN) links and intrinsic causal links — across a
  // namespace. Read from the per-segment tally plus the WAL tail (the same adjustment
  // Stats.doc_count and MetadataStats make), so it is a metadata read, not a corpus scan. The
  // primitive behind the bank stats page's link count.
  rpc LinkStats(LinkStatsRequest) returns (LinkStatsResponse);

  // Page through a memory_type's stored memories in cluster order. This is a full scan by
  // construction — the cost DOES grow with the corpus — so it exists for browsing and
  // debugging, never for retrieval. Use `Query` to find things.
  rpc Scan(ScanRequest) returns (ScanResponse);

  // Tombstone every memory matching a predicate. The predicate is metadata AND tags (all
  // must hold), e.g. `{document_id, chunk_id}` to replace a document's facts on re-ingest.
  // A full scan by construction (metadata is not indexed) — a maintenance op, not a query.
  rpc DeleteByPredicate(DeleteByPredicateRequest) returns (DeleteByPredicateResponse);

  // The write-ahead log as an operator view: which sequences are committed, and which the
  // indexer has not folded yet. Entries at or below the manifest's `wal_index_cursor` are
  // folded and may already have been reclaimed by GC, so this is a window on the live log,
  // not a history of every write ever made.
  rpc ListWal(ListWalRequest) returns (ListWalResponse);

  // How k-means partitioned one memory_type: its trained centroids, per-cluster sizes and
  // tag summaries, and optionally a sample of member memories. Centroids are already
  // resident on every query node, so returning them alone costs no object-storage read;
  // sampling members does read cluster files, and is bounded by `member_sample`.
  rpc IndexLayout(IndexLayoutRequest) returns (IndexLayoutResponse);

  // What this replica is holding in its two-tier read cache, and how well it is working.
  //
  // UNLIKE EVERY OTHER RPC HERE, this one is NOT answerable by any replica: the cache is
  // process-local, so the answer describes whichever pod the call happened to land on and
  // two calls behind a load balancer will disagree. It is a node inspection tool, not a
  // cluster-wide view. Nothing it reports affects correctness — a cold cache changes
  // latency only (INV-4).
  rpc CacheStats(CacheStatsRequest) returns (CacheStatsResponse);

  // Every object a namespace owns in object storage, classified by kind, with whether the
  // current manifest still references it. This is the physical view — what is actually on
  // S3 — as opposed to `Stats`, which is the logical one.
  rpc ListObjects(ListObjectsRequest) returns (ListObjectsResponse);

  // Decode one stored object into readable JSON. A debugging and teaching tool: it exists
  // so an operator can see what is really inside a cluster file or a WAL entry, not as a
  // data access path — reading memories is `Get`/`Scan`/`Query`.
  rpc DecodeObject(DecodeObjectRequest) returns (DecodeObjectResponse);
}

// ---- Value types -----------------------------------------------------------

// A dense embedding as raw little-endian float32, length = dim * 4 bytes. Sent as bytes
// (not `repeated float`) so it is zero-copy on both ends and ~4x smaller than JSON floats.
message Vector {
  bytes f32le = 1;
}

message Timestamps {
  optional int64 event_date = 1;
  optional int64 occurred_start = 2;
  optional int64 occurred_end = 3;
  optional int64 mentioned_at = 4;
  // When the memory was last written, as opposed to when the thing it describes happened.
  // The other four are content time; this is write time, and it is what "changed since X"
  // ranges over (see `updated_from` / `updated_to` on Query and Scan).
  optional int64 updated_at = 5;
}

enum LinkType {
  CAUSES = 0;
  CAUSED_BY = 1;
  ENABLES = 2;
  PREVENTS = 3;
}

// A derived kNN edge. The indexer computes these during the fold and stores them on the
// memory, so returning them costs no extra read — they are already materialized alongside
// the payload. Capped per memory by the index (see MAX_SEMANTIC_OUT).
message SemanticEdge {
  bytes target = 1;     // 16-byte MemoryId
  float weight = 2;
}

// A causal edge is intrinsic to a memory and travels in the WAL (semantic edges, by
// contrast, are derived by the indexer and never sent by clients).
message CausalEdge {
  bytes target = 1;     // 16-byte MemoryId
  LinkType link_type = 2;
  float weight = 3;
}

message Memory {
  // 16-byte MemoryId. Leave empty and set `key` to have the server derive a stable id.
  bytes id = 1;
  // Optional external key; if `id` is empty the server derives id = uuidv5(key).
  string key = 2;
  Vector vector = 3;
  string text = 4;
  uint32 memory_type = 5;   // fits u8; values > 255 are rejected
  // Text to index for full-text search when it should differ from `text`. Empty means
  // "index `text`". Lets a client enrich what BM25 matches on — entity names, spelled-out
  // dates — without changing the text returned on a hit. Never returned; `text` is.
  string index_text = 12;
  repeated string tags = 6;
  uint32 proof_count = 7;
  repeated bytes entity_ids = 8;    // 16-byte EntityIds (UUIDs)
  Timestamps timestamps = 9;
  repeated CausalEdge causal_out = 10;
  // Opaque client key→value metadata. memlake never indexes or interprets it — it is stored
  // verbatim and returned on read (see `MemoryPayload.metadata`). Use it for fields memlake
  // has no first-class model of: context, document_id, chunk_id, arbitrary JSON-as-string.
  map<string, string> metadata = 11;
}

// A tag list wrapper — message presence distinguishes "replace tags with this (maybe empty)
// list" from "leave tags untouched", which a bare `repeated` cannot.
message TagList {
  repeated string tags = 1;
}

// A partial update to one memory: set only the fields present, leave the rest. Avoids
// re-sending the whole memory for consolidation/curation edits. `proof_count_delta` is
// relative; the rest are absolute sets (metadata merges its keys, it does not replace).
message Patch {
  bytes id = 1;                       // 16-byte MemoryId
  int32 proof_count_delta = 2;        // relative; 0 = no change
  optional string text = 3;           // set text
  Vector vector = 4;                  // set the embedding (present => set)
  TagList tags = 5;                   // replace tags (present => set, empty list clears)
  // Set the timestamps that are present, leaving the rest of the memory's alone. Field
  // presence is what decides: `Timestamps` fields are `optional`, so "not mentioned" and
  // "set to 0" are distinct on the wire.
  Timestamps timestamps = 6;
  // Replace the whole `Timestamps` instead of merging into it, so a field absent above is
  // *cleared*. The only way to null a timestamp, and off by default because the merge is
  // what a partial update means — the replace silently discards the times a caller never
  // mentioned, which is data loss dressed as a no-op.
  bool replace_timestamps = 8;
  map<string, string> metadata = 7;   // upsert these metadata keys (merge, not replace)
}

// A conjunction (AND) over a memory's type, metadata, and tags. An empty predicate matches
// every memory (used for "delete everything"). Reused by TombstoneWhere and DeleteByPredicate.
message Predicate {
  repeated uint32 memory_types = 1;      // restrict to these types; empty = any
  map<string, string> metadata_equals = 2;  // all these key=value pairs must be present
  TagFilter tags = 3;                    // optional tag condition
}

message Op {
  oneof kind {
    Memory upsert = 1;
    bytes tombstone = 2;          // 16-byte MemoryId to delete
    Patch patch = 3;
    uint64 guard_expect_seq_lt = 4;   // optimistic precondition (compare-and-set)
    // Delete every memory matching the predicate whose last write is older than this entry's
    // sequence. Put it in the SAME entry as a re-ingest's upserts to atomically replace a
    // document's facts: the new upserts share this seq, so the delete spares them.
    Predicate tombstone_where = 5;
  }
}

// ---- Write -----------------------------------------------------------------

message WriteRequest {
  string namespace = 1;
  repeated Op ops = 2;          // applied atomically as one WAL entry
  // Wait until the background indexer has folded this write's sequence into a segment before
  // returning (polls the manifest cursor). The serve replica does NOT fold itself — folding is
  // the indexer Deployment's job — so this requires the indexer to be running, and times out
  // otherwise. Off by default, and NOT needed for consistency: a normal write is durable and
  // immediately queryable via the WAL tail the instant it is acked. Use it only when a caller
  // wants the write already in a segment (e.g. so its derived semantic links exist) before it
  // proceeds. A timeout is soft: the write is still durable and visible via the tail.
  bool wait_for_index = 3;
}

message WriteResponse {
  uint64 seq = 1;               // the claimed WAL sequence (the write's order point)
  uint32 attempts = 2;          // conditional-PUT attempts it took to claim the slot
  // The generation this write is folded into, set only when `wait_for_index` was requested
  // (0 otherwise). Lets a caller confirm the fold advanced and observe the new generation.
  uint64 generation = 3;
}

// ---- Query -----------------------------------------------------------------

enum TagsMatch {
  ANY = 0;         // memory has at least one of the tags (untagged allowed)
  ALL = 1;         // memory has all of the tags (untagged allowed)
  ANY_STRICT = 2;  // ANY, but exclude untagged memories
  ALL_STRICT = 3;  // ALL, but exclude untagged memories
  EXACT = 4;       // memory's tag set equals the filter exactly
}

message TagFilter {
  repeated string tags = 1;
  TagsMatch mode = 2;
}

message QueryRequest {
  string namespace = 1;
  // memory_types to query. Empty means every type present in the snapshot. Each type is an
  // independent index; hits carry their memory_type and are never fused across types.
  repeated uint32 memory_types = 2;
  Vector vector = 3;           // the dense + graph arms (omit to skip both)
  string text = 4;             // the full-text arm (empty to skip)
  TagFilter tags = 5;          // omit for no tag filter
  // Per-arm candidate depth; 0 uses the server default. Which arms run is decided by the
  // inputs: `vector` drives dense + graph, `text` drives full-text. (The graph arm always
  // runs alongside the dense arm — the 3-way query is the normal path.)
  uint32 vector_top_k = 6;
  uint32 text_top_k = 7;
  uint32 graph_top_k = 8;
  uint32 nprobe = 9;           // IVF clusters probed (0 = server default)
  reserved 10;                 // was `Consistency consistency` (reads are always strong now)
  // The temporal arm: when both are set, select entry points whose effective time
  // (COALESCE(occurred_start, mentioned_at, occurred_end)) falls in [temporal_from,
  // temporal_to], spread one hop through links, and score by proximity to the window centre.
  // Epoch ints; the unit only needs to match what was written. Requires `vector` (entry
  // points are similarity-ranked). Omit either to skip the arm.
  optional int64 temporal_from = 11;
  optional int64 temporal_to = 12;
  // Restrict to memories whose `timestamps.updated_at` falls strictly inside this window
  // (epoch ms). Applied as a filter over candidates, not an index lookup. A memory with no
  // `updated_at` is excluded from a bounded window.
  optional int64 updated_from = 13;
  optional int64 updated_to = 14;
  // Minimum dense cosine similarity a vector hit must reach to seed the graph arm's link
  // expansion. Unset uses the server default (0.3); 0 seeds the expansion from every dense hit.
  // A hit below the floor still ranks in the dense arm — it just does not spawn an expansion.
  optional float graph_seed_min_similarity = 15;
}

// One arm's raw contribution to a hit. `present` says whether the arm surfaced this id;
// when true, `rank` is its 0-based position within that arm and `score` its native score
// (dense = cosine similarity, text = BM25, graph = activation).
message ArmScore {
  bool present = 1;
  uint32 rank = 2;
  float score = 3;
}

// The stored memory returned inline with a search hit. The server already has it
// materialized to score the candidate, so returning it costs no extra object-storage read —
// recall never needs a second round trip to hydrate. The embedding vector is omitted (large
// and the client already has it); request it via Get if needed.
message MemoryPayload {
  string text = 1;
  repeated string tags = 2;
  uint32 proof_count = 3;
  repeated bytes entity_ids = 4;    // 16-byte EntityIds
  Timestamps timestamps = 5;
  repeated CausalEdge causal_out = 6;
  map<string, string> metadata = 7;   // the opaque metadata, verbatim
  // Derived kNN edges, present only when the read opted in via `include_edges`. Off by
  // default because the ranking path (Query) never uses them and would pay the bytes on
  // every candidate; the graph view reads them through Scan/Get, where the memory is
  // already materialized and the edges cost nothing extra to include.
  repeated SemanticEdge semantic_out = 8;
}

// A retrieved candidate with the raw signal from each arm plus the materialized memory.
// memlake does NO fusion: the client combines the raw arm scores (RRF, weighting,
// re-ranking) itself.
message Hit {
  bytes id = 1;                // 16-byte MemoryId
  uint32 memory_type = 2;
  ArmScore dense = 3;          // vector / cosine arm
  ArmScore text = 4;           // BM25 arm
  ArmScore graph = 5;          // graph-expansion arm
  ArmScore temporal = 7;       // temporal arm (entry points + one-hop spread)
  MemoryPayload memory = 6;    // the stored memory, returned inline (no extra roundtrip)
}

message QueryResponse {
  // The union of candidates across arms and memory_types. Unordered — the client ranks by
  // its own fusion. Group by `memory_type` first (types are independent).
  repeated Hit hits = 1;
  uint32 load_roundtrips = 2;  // shared across arms + types (reads coalesce into common waves)
}

// ---- Namespace -------------------------------------------------------------

message CreateNamespaceRequest {
  string namespace = 1;
  // Metadata keys to index for value-count aggregation (MetadataStats). Declared once at
  // creation and carried across every index swap; the fold tallies each item's value for
  // exactly these keys, so the cost is bounded by distinct declared (key, value) pairs.
  // Ignored if the namespace already exists (create is idempotent).
  repeated string indexed_metadata_keys = 2;
}

message CreateNamespaceResponse {}

message DeleteNamespaceRequest {
  string namespace = 1;
}

message DeleteNamespaceResponse {
  uint64 objects_deleted = 1;
}

// ---- Delete by predicate ---------------------------------------------------

message DeleteByPredicateRequest {
  string namespace = 1;
  // memory_types to scan; empty means all. (Only these types are considered for deletion.)
  repeated uint32 memory_types = 2;
  // Match memories whose metadata contains ALL these key=value pairs (AND) — e.g.
  // {"document_id": "d-42", "chunk_id": "3"}. Empty matches on tags / delete_all alone.
  map<string, string> metadata_equals = 3;
  TagFilter tags = 4;         // optional additional filter, AND-ed with metadata_equals
  // Safety: an empty predicate (no metadata, no tags) is rejected unless delete_all is set,
  // so a stray empty request cannot wipe the namespace by accident.
  bool delete_all = 5;
  // How the delete is executed:
  //   false (default) — write one TombstoneWhere WAL op: atomic, race-closed, and lazy
  //     (materialized at the next fold). `deleted` is 0 (nothing is scanned). This is the
  //     right path for document re-ingest. To replace atomically, prefer a single Write with
  //     [Op.tombstone_where, Op.upsert...] so the delete and the new facts share one seq.
  //   true — scan now and tombstone matches by id: O(corpus), returns the exact `deleted`
  //     count, and materializes immediately. An admin verb, not the ingest path.
  bool eager = 6;
}

message DeleteByPredicateResponse {
  uint64 deleted = 1;   // number of memories tombstoned
  uint64 seq = 2;       // WAL sequence of the tombstone batch (0 if nothing matched)
}

// ---- Admin / introspection -------------------------------------------------

message ListNamespacesRequest {}

message ListNamespacesResponse {
  repeated string namespaces = 1;   // sorted
}

message StatsRequest {
  string namespace = 1;
  reserved 2;                  // was `Consistency consistency`
}

// One memory_type's index state. Each type is an independent index, so every number here
// is per-type; there is no meaningful corpus-wide equivalent except their sum.
message TypeStats {
  uint32 memory_type = 1;
  // Live memories: the indexed generation's count, minus tombstones, plus un-indexed WAL
  // tail entries. This is what a query can actually return.
  uint64 doc_count = 2;
  uint32 cluster_count = 3;
  // Memory count when this type's IVF centroids were last trained. The gap between this
  // and doc_count is what drives an assign-only retrain.
  uint64 train_count = 4;
  bool has_index = 5;   // false = present only in the WAL tail, never indexed yet
}

message StatsResponse {
  string namespace = 1;
  uint64 generation = 2;
  optional uint64 prev_generation = 3;
  uint64 wal_head = 4;
  // Last WAL sequence folded into the generation. `wal_head - wal_index_cursor` is the
  // un-indexed backlog every query pays to scan.
  uint64 wal_index_cursor = 5;
  string tokenizer_config_hash = 6;
  uint32 format_version = 7;
  uint64 doc_count = 8;              // sum over types
  repeated TypeStats types = 9;
  uint64 through_seq = 10;           // the WAL sequence this snapshot reflects
  uint32 load_roundtrips = 11;
}

message GetRequest {
  string namespace = 1;
  repeated bytes ids = 2;            // 16-byte MemoryIds
  // Include each memory's derived semantic edges (see MemoryPayload.semantic_out).
  bool include_edges = 5;
  // Include the embedding. Off by default: vectors dominate the response size and a
  // caller browsing memories rarely wants them.
  bool include_vector = 3;
  reserved 4;                  // was `Consistency consistency`
}

message GetResponse {
  // Only ids that resolved, in request order. A missing or tombstoned id is simply absent
  // — Get is not an existence assertion.
  repeated StoredMemoryRecord memories = 1;
}

// A memory returned by a non-query read. Unlike `Hit` there are no arm scores: nothing
// ranked it, it was addressed directly.
message StoredMemoryRecord {
  bytes id = 1;
  uint32 memory_type = 2;
  MemoryPayload memory = 3;
  Vector vector = 4;                 // present only if include_vector was set
}

message EntityStatsRequest {
  string namespace = 1;
  // Restrict to these memory_types; empty means every type in the snapshot.
  repeated uint32 memory_types = 2;
  // Count only these entities (16-byte EntityIds). Empty returns every entity present,
  // which is what an orphan sweep wants.
  repeated bytes entity_ids = 3;
}

message EntityCount {
  bytes entity_id = 1;          // 16-byte EntityId
  uint64 memory_count = 2;      // live memories carrying it
}

message EntityStatsResponse {
  // Entities with no live memories are absent rather than reported as zero — an id the
  // caller asked for and does not get back is an orphan.
  repeated EntityCount entities = 1;
}

message MetadataStatsRequest {
  string namespace = 1;
  // The declared metadata key to count by (e.g. "document_id", "consolidated").
  string key = 2;
  // Restrict to these memory_types; empty means every type in the snapshot.
  repeated uint32 memory_types = 3;
}

message MetadataValueCount {
  string value = 1;
  uint64 count = 2;             // live memories whose `key` equals `value`
}

message MetadataStatsResponse {
  // A value with no live memories is absent rather than reported as zero. Empty when the key
  // was never declared for this namespace.
  repeated MetadataValueCount values = 1;
}

message LinkStatsRequest {
  string namespace = 1;
  // Restrict to these memory_types; empty means every type in the snapshot.
  repeated uint32 memory_types = 2;
}

message LinkStatsResponse {
  uint64 semantic_edge_count = 1;   // derived kNN links
  uint64 causal_edge_count = 2;     // intrinsic causal links (causes/caused_by/enables/prevents)
  // Temporal links, derived from the time index (not stored): each memory's neighbours within
  // ±24h, capped per unit — the count Hindsight's stored temporal rows would have.
  uint64 temporal_edge_count = 3;
}

message ScanRequest {
  string namespace = 1;
  // Types to walk, in ascending order. Empty means every type in the snapshot.
  repeated uint32 memory_types = 2;
  uint32 limit = 3;                  // 0 uses the server default
  // Opaque cursor from the previous response. Empty starts at the beginning. A cursor is
  // only valid against the generation that produced it; the server restarts the scan if
  // the generation moved under it. It is a position, not a snapshot: writes landing
  // mid-walk can shift later pages, so a scan is eventually-complete browsing, not a
  // consistent iterator. Do not build anything that needs exactly-once over a live corpus
  // on it.
  string page_token = 4;
  bool include_vector = 5;
  TagFilter tags = 6;                // omit for no tag filter
  reserved 7;                        // was `Consistency consistency`
  // Metadata key=value pairs a memory must ALL carry to be returned, AND-ed with `tags`.
  // Same shape `DeleteByPredicate` takes — e.g. `{"document_id": "d-42"}` to page one
  // document's memories, or a marker key to page only the memories carrying it. Metadata is
  // not indexed, so this narrows what a walk *returns*, not what it *reads*: the scan still
  // touches every cluster. It is the difference between the caller filtering N pages client
  // side and the server filtering them, not an index lookup.
  map<string, string> metadata_equals = 8;
  // Include each memory's derived semantic edges (see MemoryPayload.semantic_out).
  bool include_edges = 10;
  // Discard this many matching memories before filling the page. Lets a caller reach an
  // offset without paging to it, at the cost of the server doing the same walk — O(skip),
  // just without the round trips. Prefer `page_token` when you have one.
  uint64 skip = 9;
  // Same `updated_at` window as Query, AND-ed with the tag and metadata conditions.
  optional int64 updated_from = 11;
  optional int64 updated_to = 12;
}

message ScanResponse {
  repeated StoredMemoryRecord memories = 1;
  string next_page_token = 2;        // empty when the scan is exhausted
}

// ---- WAL introspection -----------------------------------------------------

message ListWalRequest {
  string namespace = 1;
  // Start at this sequence. 0 begins at the oldest entry still retained.
  uint64 start_seq = 2;
  uint32 limit = 3;          // 0 uses the server default
  // Decode each entry's ops. Off by default: one entry is a whole group-commit batch and
  // can hold thousands of memories, so the listing stays a header view unless asked.
  bool include_ops = 4;
}

// How many of each op kind an entry holds. Counting requires decoding the entry, so this
// is populated only when `include_ops` was set — and left ABSENT otherwise, because zeroed
// counts would read as "this entry has no ops" rather than "nobody counted".
message WalOpCounts {
  uint32 upserts = 1;
  uint32 tombstones = 2;
  uint32 patches = 3;
  uint32 guards = 4;
  // Predicate deletes (`DeleteByPredicate`). Counted apart from `tombstones` because one
  // op can remove any number of memories, so the two are not comparable quantities.
  uint32 predicate_tombstones = 5;
}

// One op inside an entry. An upsert reports its memory's identity and shape rather than
// the whole record — this is a log view, not a way to read memories back (use Get).
message WalOpDetail {
  oneof kind {
    WalUpsert upsert = 1;
    bytes tombstone = 2;              // 16-byte MemoryId
    Patch patch = 3;
    uint64 guard_expect_seq_lt = 4;
    // A predicate delete, rendered as a human-readable summary of what it matched
    // (e.g. `type=1 meta[document_id=d-42] tags:ANY[prod]`). The log view shows what the
    // op asked for; which memories it actually hit is not recorded in the entry.
    string tombstone_where = 5;
  }
}

message WalUpsert {
  bytes id = 1;                       // 16-byte MemoryId
  uint32 memory_type = 2;
  string text = 3;
  repeated string tags = 4;
  uint32 vector_dim = 5;              // 0 = the memory carries no embedding
}

message WalEntryInfo {
  uint64 seq = 1;                     // the entry's order point
  uint64 size_bytes = 2;              // the WAL object's size
  WalOpCounts counts = 3;
  // True once the indexer has folded this entry into a generation (seq <= wal_index_cursor).
  // Un-folded entries are exactly what every query pays to scan on every read.
  bool folded = 4;
  repeated WalOpDetail ops = 5;       // only when include_ops was set
}

message ListWalResponse {
  repeated WalEntryInfo entries = 1;
  // Last committed sequence in the log, read from the log itself — not the manifest's copy,
  // which the indexer writes equal to the cursor and so can never show a backlog. Global,
  // never scoped to the requested page.
  uint64 wal_head = 2;
  uint64 wal_index_cursor = 3;        // last sequence folded into the current generation
  uint64 next_seq = 4;                // resume point; 0 when the log is exhausted
}

// ---- IVF layout ------------------------------------------------------------

message IndexLayoutRequest {
  string namespace = 1;
  uint32 memory_type = 2;
  // Sample up to this many member memories, spread across clusters, and return their
  // vectors. 0 returns centroids only — which needs no object-storage read at all, since
  // the centroids are already resident. Sampling reads cluster files, so it is bounded.
  uint32 member_sample = 3;
  reserved 4;                  // was `Consistency consistency`
}

message ClusterInfo {
  uint32 cluster_id = 1;
  Vector centroid = 2;                // raw little-endian f32, length = dim * 4
  // Members assigned to this centroid when the generation was built. Note this is the
  // trained size: it does not include un-indexed WAL-tail writes.
  uint64 size = 3;
  repeated string tags = 4;           // the cluster's tag summary (union over members)
  bool has_untagged = 5;
}

// A member memory returned for plotting, with just enough to label a point.
message ClusterMember {
  bytes id = 1;                       // 16-byte MemoryId
  uint32 cluster_id = 2;
  Vector vector = 3;
  string text = 4;
}

message IndexLayoutResponse {
  string namespace = 1;
  uint32 memory_type = 2;
  uint64 generation = 3;
  uint32 dim = 4;                     // 0 when the type has no embeddings
  repeated ClusterInfo clusters = 5;
  repeated ClusterMember members = 6; // empty unless member_sample was set
}

// ---- Read cache (node-local) -----------------------------------------------

message CacheStatsRequest {
  // Only entries for this namespace. Empty returns every namespace's.
  string namespace = 1;
  // Cap on entries returned; 0 uses the server default. A warm node holds thousands of
  // blocks, so this is an inspection, not a dump.
  uint32 limit = 2;
}

// One cached object. `in_memory` and `on_disk` are INDEPENDENT, not a single tier: a
// memory eviction demotes an object to disk without dropping its bytes, so an object is
// commonly resident in both at once. A disk hit does NOT promote it back into memory —
// the cache is a CLOCK ring, where a hit sets a reference bit instead of moving the entry.
message CacheEntry {
  // Derived from the object key's first segment.
  string namespace = 1;
  // The object key, e.g. `ns/mt1/gen-3-ab/cluster-7.bin`. A RANGED read appends
  // `#start-end` (e.g. `pk.data#0-13128`): the cache is keyed by `(path, byte range)`, so
  // one object can be resident as several independent blocks.
  string path = 2;
  string etag = 3;         // part of the cache key: immutability makes a hit safe (INV-2)
  uint64 bytes = 4;
  bool in_memory = 5;
  bool on_disk = 6;
  // Rank in ADMISSION order, 0 = most recently admitted. Derived from a monotonic
  // counter, so it orders entries against each other and says nothing about wall-clock
  // time. Not a recency rank: under CLOCK a hit sets a reference bit rather than moving
  // the entry, so a long-resident hot object keeps a high rank. (The field name predates
  // the policy change; it is kept to avoid breaking clients.)
  uint32 lru_rank = 7;
}

message CacheStatsResponse {
  // Whether this replica has a cache configured at all. When false every field below is
  // zero and the node reads through to object storage every time.
  bool enabled = 1;

  // Both tiers are bounded independently, so peak RAM and peak disk are each capped by
  // construction regardless of workload.
  uint64 mem_bytes = 2;
  uint64 mem_budget = 3;
  uint64 disk_bytes = 4;
  uint64 disk_budget = 5;

  uint64 mem_entries = 6;
  uint64 disk_entries = 7;   // overlaps mem_entries; the tiers are not a partition

  uint64 hits = 8;
  uint64 misses = 9;

  // Most-recently-ADMITTED first, bounded by the request's limit. The ring is ordered by
  // admission and a hit does not reorder it, so this is not a recency ranking.
  repeated CacheEntry entries = 10;
  // Entries the cache holds in total, before `limit` truncated the list.
  uint64 total_entries = 11;
}

// ---- Object storage browser ------------------------------------------------

// What a stored object is, inferred from its key. The namespace-level objects are
// `{namespace}/manifest.json`, `{namespace}/wal/{seq}.bin`, `{namespace}/wal-head` (the head
// pointer), and `{namespace}/index-lease.json` (a soft indexer lease); a per-segment delete overlay
// lives at `{namespace}/seg-{id}/tombstones.json`, and the per-memory_type index files at
// `{namespace}/seg-{id}/mt{type}/{file}`. The index is segmented (LSM): a flush appends a new L0
// segment, unchanged segments are carried forward by reference across manifest generations, and
// only a compaction rewrites — so a segment's files are NOT tied to one generation.
enum ObjectKind {
  OBJECT_KIND_UNKNOWN = 0;
  MANIFEST = 1;        // the one mutable object: the pointer defining the current segment set
  WAL_ENTRY = 2;       // one atomic group-commit batch
  CLUSTER = 3;         // an IVF cluster's memory records (vectors stripped out)
  CENTROIDS = 4;       // the trained centroid table
  PK_INDEX = 5;        // sparse index over pk.data
  PK_DATA = 6;         // id -> cluster, in SSTable blocks
  RADJ_INDEX = 7;      // sparse index over radj.data
  RADJ_DATA = 8;       // reverse adjacency (incoming edges) blocks
  ENTITY_INDEX = 9;
  ENTITY_DATA = 10;    // EntityId -> [MemoryId] postings
  TIME_INDEX = 11;
  TIME_DATA = 12;      // effective timestamp -> [MemoryId]
  FTS_SPLIT = 13;      // the tantivy split; opaque to memlake, not decodable here
  STATS = 14;
  TAG_SUMMARY = 15;    // per-cluster tag unions, for pruning before fetch
  PAYLOAD_INDEX = 16;
  PAYLOAD_DATA = 17;   // MemoryId -> memory bytes, so a hit hydrates without a cluster read
  VECTOR_BLOCK = 18;   // cluster-{i}.vec — the quantized vector block the vector arm scans
  RERANK_INDEX = 19;   // sparse index over rerank.data
  RERANK_DATA = 20;    // MemoryId -> exact f32 embedding, for the final exact rerank
  SEGMENT_TOMBSTONES = 21; // tombstones.json — a segment's delete overlay over older segments
  INDEX_LEASE = 22;    // index-lease.json — a soft, best-effort indexer lease
  WAL_HEAD = 23;       // wal-head — the cached WAL head pointer (highest committed sequence)
}

message ListObjectsRequest {
  string namespace = 1;
  uint32 limit = 2;              // 0 uses the server default
  string page_token = 3;         // opaque; empty starts at the beginning
}

message ObjectInfo {
  string path = 1;
  uint64 size_bytes = 2;
  ObjectKind kind = 3;
  // The segment this file belongs to, parsed from its `seg-{id}` key prefix (empty for the
  // manifest and WAL entries, which live above any segment). Files of one segment share an id,
  // and a segment persists across manifest generations until a compaction or GC drops it.
  string segment = 4;
  // Only appears under `mt{n}/` (empty for the manifest, WAL entries, and a segment's tombstones).
  uint32 memory_type = 5;
  bool has_memory_type = 6;
  // WAL entries only: the claimed sequence.
  uint64 seq = 7;
  // Whether the CURRENT manifest still references this object. Every object except the manifest is
  // immutable, so GC — not overwrite — is what reclaims space. False means garbage awaiting GC: a
  // WAL entry already folded, or a segment dropped by a compaction (whose inputs it replaced). A
  // flush does NOT make older segments garbage — they are carried forward by reference — so most
  // segment files stay live across many generations.
  bool live = 8;
}

message ListObjectsResponse {
  repeated ObjectInfo objects = 1;
  uint64 total_objects = 2;      // across the whole namespace, before paging
  uint64 total_bytes = 3;
  uint64 live_bytes = 4;         // bytes the current manifest still references
  uint64 generation = 5;         // the manifest's current generation, for context
  string next_page_token = 6;    // empty when exhausted
}

message DecodeObjectRequest {
  string namespace = 1;
  string path = 2;               // as returned by ListObjects
  // Max items to decode out of a container (cluster memories, WAL ops, SSTable records).
  // 0 uses the server default. One cluster file can hold thousands of memories.
  uint32 limit = 3;
}

message DecodeObjectResponse {
  ObjectKind kind = 1;
  // The decoded object rendered as JSON. Shape depends on `kind` and is deliberately NOT a
  // stable contract — it is a human-readable debugging view, and it changes when the
  // on-disk formats change. Do not parse it programmatically.
  string json = 2;
  uint64 size_bytes = 3;
  // Items the object holds in total, and whether `json` shows all of them.
  uint64 total_items = 4;
  bool truncated = 5;
  // Set when the object has no standalone decoding, with the reason: the FTS split is an
  // opaque tantivy blob, and an SSTable's `.data` half is addressed by byte range through
  // its sibling `.idx` rather than read sequentially. `json` then carries only metadata.
  // This is an explanation, not an error — the object is intact and being read normally.
  string undecodable_reason = 6;
}
