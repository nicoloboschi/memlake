syntax = "proto3";

// memlake gRPC API. Internal, service-to-service (east-west): this replaces a direct
// Postgres connection in Hindsight. Every RPC is answerable by any stateless server
// replica — all coordination happens in object storage — so the deployment is N identical
// `serve` pods behind one k8s Service, plus a separate `index` Deployment.
package memlake.v1;

service Memlake {
  // Ensure a namespace (bank) exists. Idempotent: safe to call on every startup.
  rpc CreateNamespace(CreateNamespaceRequest) returns (CreateNamespaceResponse);

  // Write a batch of ops as one atomic WAL entry. Returns once the entry is durably
  // persisted to object storage under a uniquely-claimed sequence number — NOT after
  // indexing. The write is immediately visible to any STRONG-consistency Query.
  rpc Write(WriteRequest) returns (WriteResponse);

  // Answer a query across one or more memory_types in a single call. Always runs all three
  // arms (dense vector + BM25 full-text + graph expansion) over one shared snapshot, so the
  // storage reads coalesce into common roundtrip waves. Returns each candidate with its raw
  // per-arm scores; the client fuses. memory_types are independent — hits are never fused
  // across types.
  rpc Query(QueryRequest) returns (QueryResponse);
}

// ---- Value types -----------------------------------------------------------

// A dense embedding as raw little-endian float32, length = dim * 4 bytes. Sent as bytes
// (not `repeated float`) so it is zero-copy on both ends and ~4x smaller than JSON floats.
message Vector {
  bytes f32le = 1;
}

message Timestamps {
  optional int64 event_date = 1;
  optional int64 occurred_start = 2;
  optional int64 occurred_end = 3;
  optional int64 mentioned_at = 4;
}

enum LinkType {
  CAUSES = 0;
  CAUSED_BY = 1;
  ENABLES = 2;
  PREVENTS = 3;
}

// A causal edge is intrinsic to a memory and travels in the WAL (semantic edges, by
// contrast, are derived by the indexer and never sent by clients).
message CausalEdge {
  bytes target = 1;     // 16-byte MemoryId
  LinkType link_type = 2;
  float weight = 3;
}

message Memory {
  // 16-byte MemoryId. Leave empty and set `key` to have the server derive a stable id.
  bytes id = 1;
  // Optional external key; if `id` is empty the server derives id = uuidv5(key).
  string key = 2;
  Vector vector = 3;
  string text = 4;
  uint32 memory_type = 5;   // fits u8; values > 255 are rejected
  repeated string tags = 6;
  uint32 proof_count = 7;
  repeated bytes entity_ids = 8;    // 16-byte EntityIds (UUIDs)
  Timestamps timestamps = 9;
  repeated CausalEdge causal_out = 10;
  // Opaque client key→value metadata. memlake never indexes or interprets it — it is stored
  // verbatim and returned on read (see `MemoryPayload.metadata`). Use it for fields memlake
  // has no first-class model of: context, document_id, chunk_id, arbitrary JSON-as-string.
  map<string, string> metadata = 11;
}

message Patch {
  bytes id = 1;               // 16-byte MemoryId
  int32 proof_count_delta = 2;
}

message Op {
  oneof kind {
    Memory upsert = 1;
    bytes tombstone = 2;          // 16-byte MemoryId to delete
    Patch patch = 3;
    uint64 guard_expect_seq_lt = 4;   // optimistic precondition (compare-and-set)
  }
}

// ---- Write -----------------------------------------------------------------

message WriteRequest {
  string namespace = 1;
  repeated Op ops = 2;          // applied atomically as one WAL entry
}

message WriteResponse {
  uint64 seq = 1;               // the claimed WAL sequence (the write's order point)
  uint32 attempts = 2;          // conditional-PUT attempts it took to claim the slot
}

// ---- Query -----------------------------------------------------------------

enum Consistency {
  STRONG = 0;     // reflect every acked write (checks WAL head, scans the tail)
  EVENTUAL = 1;   // serve from the cached manifest; staleness bounded by index interval
}

enum TagsMatch {
  ANY = 0;         // memory has at least one of the tags (untagged allowed)
  ALL = 1;         // memory has all of the tags (untagged allowed)
  ANY_STRICT = 2;  // ANY, but exclude untagged memories
  ALL_STRICT = 3;  // ALL, but exclude untagged memories
  EXACT = 4;       // memory's tag set equals the filter exactly
}

message TagFilter {
  repeated string tags = 1;
  TagsMatch mode = 2;
}

message QueryRequest {
  string namespace = 1;
  // memory_types to query. Empty means every type present in the snapshot. Each type is an
  // independent index; hits carry their memory_type and are never fused across types.
  repeated uint32 memory_types = 2;
  Vector vector = 3;           // the dense + graph arms (omit to skip both)
  string text = 4;             // the full-text arm (empty to skip)
  TagFilter tags = 5;          // omit for no tag filter
  // Per-arm candidate depth; 0 uses the server default. Which arms run is decided by the
  // inputs: `vector` drives dense + graph, `text` drives full-text. (The graph arm always
  // runs alongside the dense arm — the 3-way query is the normal path.)
  uint32 vector_top_k = 6;
  uint32 text_top_k = 7;
  uint32 graph_top_k = 8;
  uint32 nprobe = 9;           // IVF clusters probed (0 = server default)
  Consistency consistency = 10;
}

// One arm's raw contribution to a hit. `present` says whether the arm surfaced this id;
// when true, `rank` is its 0-based position within that arm and `score` its native score
// (dense = cosine similarity, text = BM25, graph = activation).
message ArmScore {
  bool present = 1;
  uint32 rank = 2;
  float score = 3;
}

// The stored memory returned inline with a search hit. The server already has it
// materialized to score the candidate, so returning it costs no extra object-storage read —
// recall never needs a second round trip to hydrate. The embedding vector is omitted (large
// and the client already has it); request it via Get if needed.
message MemoryPayload {
  string text = 1;
  repeated string tags = 2;
  uint32 proof_count = 3;
  repeated bytes entity_ids = 4;    // 16-byte EntityIds
  Timestamps timestamps = 5;
  repeated CausalEdge causal_out = 6;
  map<string, string> metadata = 7;   // the opaque metadata, verbatim
}

// A retrieved candidate with the raw signal from each arm plus the materialized memory.
// memlake does NO fusion: the client combines the raw arm scores (RRF, weighting,
// re-ranking) itself.
message Hit {
  bytes id = 1;                // 16-byte MemoryId
  uint32 memory_type = 2;
  ArmScore dense = 3;          // vector / cosine arm
  ArmScore text = 4;           // BM25 arm
  ArmScore graph = 5;          // graph-expansion arm
  MemoryPayload memory = 6;    // the stored memory, returned inline (no extra roundtrip)
}

message QueryResponse {
  // The union of candidates across arms and memory_types. Unordered — the client ranks by
  // its own fusion. Group by `memory_type` first (types are independent).
  repeated Hit hits = 1;
  uint32 load_roundtrips = 2;  // shared across arms + types (reads coalesce into common waves)
}

// ---- Namespace -------------------------------------------------------------

message CreateNamespaceRequest {
  string namespace = 1;
}

message CreateNamespaceResponse {}
