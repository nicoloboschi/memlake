# Performance topology: the REAL two-process deployment (serve + index) over object storage,
# under REAL container resource limits. This is what `mlake-perf` (in-process) cannot measure:
# how much CPU serving queries costs and what latency/QPS SLA a given compute budget buys.
#
# Every limit is an env var with a sane default, so a compute sweep is just:
#
#   SERVE_CPUS=1 SERVE_MEM=2g SERVE_MEM_MB=1024 \
#     docker compose -f docker-compose.perf.yml up -d --build
#
# Backend: defaults to the bundled MinIO. MinIO-local has ~zero network latency, so it
# measures the CPU->QPS relationship faithfully but UNDERSTATES cold-query latency (the real
# SLA is S3-round-trip-bound). To run the latency-SLA pass against real AWS S3, override the
# S3 env for the `serve`/`indexer` services (endpoint empty + real creds+bucket), e.g.:
#
#   MEMLAKE_QUERY_S3_ENDPOINT= MEMLAKE_INDEXER_S3_ENDPOINT= \
#   MEMLAKE_QUERY_S3_BUCKET=my-bucket MEMLAKE_INDEXER_S3_BUCKET=my-bucket \
#   MEMLAKE_QUERY_S3_ACCESS_KEY=... MEMLAKE_QUERY_S3_SECRET_KEY=... (+ INDEXER_* creds) \
#     docker compose -f docker-compose.perf.yml up -d

services:
  # Object storage. MinIO gives real S3 conditional-write semantics (If-None-Match / If-Match).
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: memlake
      MINIO_ROOT_PASSWORD: memlake123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-perf-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Creates the bucket once MinIO is up, then exits.
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 memlake memlake123 &&
      mc mb --ignore-existing local/memlake &&
      echo 'bucket ready'
      "

  # The stateless gRPC API under a hard CPU + memory limit (CFS quota == a k8s CPU limit).
  # `--mem-mb` (the cache budget) is a SAFE FRACTION of the container memory limit so the
  # cache cannot push the process past the limit and trigger an OOM kill.
  serve:
    build:
      context: .
      dockerfile: Dockerfile
    image: memlake:perf
    command: >
      serve
      --addr 0.0.0.0:50051
      --mem-mb ${SERVE_MEM_MB:-1024}
      --disk-mb ${SERVE_DISK_MB:-8192}
      --max-concurrent-queries ${SERVE_MAX_CONCURRENT:-256}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "50051:50051"
    environment:
      # Query service S3 config. Defaults point at the bundled MinIO; override to real S3.
      MEMLAKE_QUERY_S3_BUCKET: ${MEMLAKE_QUERY_S3_BUCKET:-memlake}
      MEMLAKE_QUERY_S3_ACCESS_KEY: ${MEMLAKE_QUERY_S3_ACCESS_KEY:-memlake}
      MEMLAKE_QUERY_S3_SECRET_KEY: ${MEMLAKE_QUERY_S3_SECRET_KEY:-memlake123}
      MEMLAKE_QUERY_S3_REGION: ${MEMLAKE_QUERY_S3_REGION:-us-east-1}
      # `-` (not `:-`): passing MEMLAKE_QUERY_S3_ENDPOINT= empty selects real AWS S3.
      MEMLAKE_QUERY_S3_ENDPOINT: ${MEMLAKE_QUERY_S3_ENDPOINT-http://minio:9000}
      MEMLAKE_NODE_ID: serve-1
      RUST_LOG: ${RUST_LOG:-info}
      # Per-call JSONL audit log. On by default in this phase, written inside the mounted
      # ./perf/traces so it is readable on the host at perf/traces/serve.jsonl. Set
      # SERVE_TRACE_LOG=off to disable.
      MEMLAKE_TRACE_LOG: ${SERVE_TRACE_LOG:-/traces/serve.jsonl}
    volumes:
      - ./perf/traces:/traces
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 3s
      timeout: 2s
      retries: 30
    deploy:
      resources:
        limits:
          cpus: "${SERVE_CPUS:-2}"
          memory: ${SERVE_MEM:-2g}

  # The indexer loop as its OWN Deployment with its own (smaller) limits — off the request
  # path. It discovers namespaces and folds the WAL tail into generations every interval.
  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    image: memlake:perf
    command: >
      index
      --interval-secs ${INDEXER_INTERVAL:-5}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      MEMLAKE_INDEXER_S3_BUCKET: ${MEMLAKE_INDEXER_S3_BUCKET:-memlake}
      MEMLAKE_INDEXER_S3_ACCESS_KEY: ${MEMLAKE_INDEXER_S3_ACCESS_KEY:-memlake}
      MEMLAKE_INDEXER_S3_SECRET_KEY: ${MEMLAKE_INDEXER_S3_SECRET_KEY:-memlake123}
      MEMLAKE_INDEXER_S3_REGION: ${MEMLAKE_INDEXER_S3_REGION:-us-east-1}
      MEMLAKE_INDEXER_S3_ENDPOINT: ${MEMLAKE_INDEXER_S3_ENDPOINT-http://minio:9000}
      MEMLAKE_NODE_ID: indexer-1
      RUST_LOG: ${RUST_LOG:-info}
    deploy:
      resources:
        limits:
          cpus: "${INDEXER_CPUS:-2}"
          memory: ${INDEXER_MEM:-4g}

volumes:
  minio-perf-data:
