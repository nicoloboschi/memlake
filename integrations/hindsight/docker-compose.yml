# Run Hindsight locally against a memlake instance.
#
# This compose owns the *backend* — everything stable and repo-local:
#   * MinIO           object store (real S3 conditional-write semantics)
#   * serve           memlake's stateless gRPC query/write API  (localhost:50051)
#   * indexer         memlake's compaction loop — folds the WAL tail into segments
#
# Hindsight still keeps its non-memory metadata (documents, chunks, banks,
# operations, the entity-name registry) in Postgres, but that does NOT need a
# service here: run on the host with the default `pg0` database url and Hindsight
# starts its own embedded Postgres. See README.md.
#
# Hindsight's API process itself runs on the HOST (see README.md), not here: the
# `MEMORIES` extension seam it needs is still unreleased, so it has to run from a
# checkout of that branch with the (closed-source) hindsight_memlake extension
# installed. Once the seam ships in a Hindsight release this file can grow a
# `hindsight` service layered on the official image.
#
#   docker compose up -d --build      # bring up the backend
#   # ... then run hindsight-api on the host, see README.md
#
# Backed by the same Dockerfile as docker-compose.perf.yml, so the memlake image
# is built once and shared.

services:
  # Object storage. MinIO gives real S3 conditional-write semantics (If-None-Match / If-Match).
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: memlake
      MINIO_ROOT_PASSWORD: memlake123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Creates the bucket once MinIO is up, then exits.
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 memlake memlake123 &&
      mc mb --ignore-existing local/memlake &&
      echo 'bucket ready'
      "

  # memlake's stateless gRPC API — the `HINDSIGHT_API_MEMORIES_TARGET` Hindsight talks to.
  serve:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: memlake:local
    command: >
      serve
      --addr 0.0.0.0:50051
      --mem-mb ${SERVE_MEM_MB:-1024}
      --disk-mb ${SERVE_DISK_MB:-8192}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "50051:50051"
    environment:
      MEMLAKE_QUERY_S3_BUCKET: memlake
      MEMLAKE_QUERY_S3_ACCESS_KEY: memlake
      MEMLAKE_QUERY_S3_SECRET_KEY: memlake123
      MEMLAKE_QUERY_S3_REGION: us-east-1
      MEMLAKE_QUERY_S3_ENDPOINT: http://minio:9000
      MEMLAKE_NODE_ID: serve-1
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 3s
      timeout: 2s
      retries: 30

  # The compaction loop as its own process, off the request path. It discovers
  # namespaces and folds each WAL tail into generations every INDEXER_INTERVAL
  # seconds. Writes are queryable from the WAL tail immediately regardless — this
  # just keeps the un-indexed tail bounded and retrieval fast as volume grows.
  indexer:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: memlake:local
    command: >
      index
      --interval-secs ${INDEXER_INTERVAL:-5}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      MEMLAKE_INDEXER_S3_BUCKET: memlake
      MEMLAKE_INDEXER_S3_ACCESS_KEY: memlake
      MEMLAKE_INDEXER_S3_SECRET_KEY: memlake123
      MEMLAKE_INDEXER_S3_REGION: us-east-1
      MEMLAKE_INDEXER_S3_ENDPOINT: http://minio:9000
      MEMLAKE_NODE_ID: indexer-1
      RUST_LOG: ${RUST_LOG:-info}

volumes:
  minio-data:
