{{- if .Values.admin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "memlake.fullname" . }}-admin
  labels:
    {{- include "memlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  replicas: {{ .Values.admin.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: admin
  template:
    metadata:
      labels:
        {{- include "memlake.labels" . | nindent 8 }}
        app.kubernetes.io/component: admin
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: admin
          image: "{{ .Values.admin.repository }}:{{ .Values.admin.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # Inspection console talks to the proxy (any serve pod can answer admin RPCs).
            - name: MEMLAKE_ADDR
              value: "{{ include "memlake.fullname" . }}-proxy:{{ .Values.proxy.service.port }}"
            - name: MEMLAKE_PROTO_PATH
              value: /app/proto/memlake/v1/memlake.proto
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memlake.fullname" . }}-admin
  labels:
    {{- include "memlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: {{ .Values.admin.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: admin
  ports:
    - name: http
      port: {{ .Values.admin.service.port }}
      targetPort: 3000
{{- end }}
