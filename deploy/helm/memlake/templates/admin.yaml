{{- if .Values.admin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "memlake.fullname" . }}-admin
  labels:
    {{- include "memlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  replicas: {{ .Values.admin.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: admin
  template:
    metadata:
      labels:
        {{- include "memlake.labels" . | nindent 8 }}
        app.kubernetes.io/component: admin
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: admin
          image: "{{ .Values.admin.repository }}:{{ .Values.admin.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            # Same S3 secret the serve pods mount (MEMLAKE_QUERY_S3_*). The Observability view reads
            # the _obs/traces/ prefix directly from the bucket; obs.ts falls back to MEMLAKE_QUERY_S3_*
            # when MEMLAKE_OBS_S3_* is unset, so this grants read access with no extra secret.
            - secretRef:
                name: {{ .Values.s3.existingSecret }}
          # No env beyond the S3 block above: the console reads object storage ONLY — no gRPC
          # endpoint, no proxy dependency, no proto file. It works even when every serve pod is down.
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memlake.fullname" . }}-admin
  labels:
    {{- include "memlake.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: {{ .Values.admin.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: admin
  ports:
    - name: http
      port: {{ .Values.admin.service.port }}
      targetPort: 3000
{{- end }}
