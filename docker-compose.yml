services:
  # Object storage. MinIO is used rather than a local-filesystem stand-in because
  # INV-3 depends on real S3 conditional-write semantics (If-None-Match / If-Match).
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: memlake
      MINIO_ROOT_PASSWORD: memlake123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Creates the dev bucket once MinIO is up, then exits.
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 memlake memlake123 &&
      mc mb --ignore-existing local/memlake &&
      echo 'bucket ready'
      "

volumes:
  minio-data:
